<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TO-DO App</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Poppins:ital,wght@0,200;0,400;0,600;1,200;1,400;1,600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="todo-app">
            <h2>TO-DO LIST<img src="images/check-list.png"></h2>
            <div class="row">
                <input type="text" id="input-box" placeholder="Add your task">
                <button onclick="addTask()">Add</button>
                </div>
                <div class="status-button">
                    <button class="btn">Completed</button>
                     <button class="btn">Pending</button>
                      <button class="btn">Rejected</button>
                      
                </div>
                <hr>
                <ul id="list-container">
                    <!-- <li class="checked">task1</li>
                    <li>task2</li> -->
                </ul>
            
        </div>
    </div>

    <script src="script.js"></script>
    
</body>
</html>
